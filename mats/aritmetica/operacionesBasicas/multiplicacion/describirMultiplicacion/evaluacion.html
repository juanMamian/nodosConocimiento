<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta https-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/nodosConocimiento/recursos/estilos/estiloEvaluaciones.css">
    <link rel="stylesheet" href="/nodosConocimiento/recursos/estilos/paletaColores.css">
    <script src="/nodosConocimiento/recursos/funciones/scriptsEvaluaciones.js"> </script>
    <script src="/nodosConocimiento/mats/webComponents/numeroBolitas.js"> </script>
    <script
        src="/nodosConocimiento/recursos/webComponents/evaluaciones/bloqueCalificacionRespuesta/declaracion.js"> </script>
    <script src="/nodosConocimiento/mats/recursos/spanishToNumber.js"> </script>

    <title>Descripción de multiplicación - evaluación</title>
</head>

<body>
    <div id="contenedorPrincipal">
        <div id="contenedorConjuntos">
            <representacion-numero-bolitas id="representacionNumero">
            </representacion-numero-bolitas>
            <div id="contenedorMultiplicacion">

            </div>
        </div>
        <button class="boton" id="botonMultiplicar">
            Multiplicar
        </button>

        <div id="bloqueRespuestaUsuario">
            <div class="instruccion">
                Describe lo que sucede
            </div>
            <input type="text" class="inputRespuestaUsuario" id="inputRespuestaUsuario" value="">
            <button class="boton" id="botonAceptarRespuestaUsuario">
                Aceptar
            </button>
        </div>

        <declaracion-respuesta id="declaracionRespuesta">
        </declaracion-respuesta>

    </div>
</body>

</html>

<script>
    const bloqueRespuestaUsuario = document.querySelector("#bloqueRespuestaUsuario");
    const botonAceptarRespuestaUsuario = document.querySelector("#botonAceptarRespuestaUsuario");
    const declaracionRespuesta = document.querySelector("#declaracionRespuesta");
    const inputRespuestaUsuario = document.querySelector("#inputRespuestaUsuario");
    const representacionNumero = document.querySelector("#representacionNumero");
    const contenedorMultiplicacion = document.querySelector("#contenedorMultiplicacion");
    const botonMultiplicar = document.querySelector("#botonMultiplicar");

    let multiplicado;
    let multiplicador;

    botonMultiplicar.addEventListener("click", multiplicar);

    function reiniciarEspecifico() {
        inputRespuestaUsuario.value = "";
        bloqueRespuestaUsuario.style.display = "none"
        botonMultiplicar.style.display = "flex";
        botonAceptarRespuestaUsuario.style.display = "flex";
        representacionNumero.style.opacity = "1";

        const representacionesNumero = contenedorMultiplicacion.querySelectorAll("representacion-numero-bolitas");
        representacionesNumero.forEach(representacion => {
            representacion.remove();
        });
    }
    function generadorReto() {
        multiplicado = Math.ceil(Math.random() * 5) + 1;
        multiplicador = Math.ceil(Math.random() * 5) + 1;

        respuesta = multiplicado * multiplicador;

        representacionNumero.setAttribute("numero", multiplicado);
    }
    function syncRepresentacionMultiplicacion() {
        const representacionesNumero = contenedorMultiplicacion.querySelectorAll("representacion-numero-bolitas");
        representacionesNumero.forEach(representacion => {
            representacion.remove();
        });

        const posicionesBase = representacionNumero.listarPosiciones();
        const step = 500;
        for (let i = 0; i < multiplicador; i++) {
            const clon = representacionNumero.cloneNode(true);
            clon.setAttribute("colorBolitas", "blue");
            contenedorMultiplicacion.appendChild(clon);
            clon.asignarPosiciones(posicionesBase);
            clon.style.opacity = "0";
            setTimeout(() => {
                clon.style.transition = "opacity 0.5s";
                clon.style.opacity = "1";
                clon.scrollIntoView({behavior: "smooth"});
            }, 100 + step * i);
        }
    }

    function multiplicar() {
        botonMultiplicar.style.display = "none";
        bloqueRespuestaUsuario.style.display = "flex";
        representacionNumero.style.opacity = "0.1";
        representacionNumero.style.transition = "opacity 0.5s, transform 0.5s";
        syncRepresentacionMultiplicacion();

        inputRespuestaUsuario.focus();
    }

    function evaluarRespuestaUsuario() {
        const respuestaUsuario = inputRespuestaUsuario.value;

        let partes;
        try {
            partes = SpanishNumbers.splitByAlternatives(respuestaUsuario, ["multiplicado por", "por", "x", "*"]);
        }
        catch (error) {
            console.log(`Error: ${error}`);
            declaracionRespuesta.anunciarRespuestaIncorrecta();
        }

        if (partes.length != 2) {
            throw "Error, debería haber 2 partes";
        }
        for (let i = 0; i < partes.length; i++) {
            partes[i] = SpanishNumbers.toNumber(partes[i]);
        }

        if (partes[0] === multiplicado && partes[1] === multiplicador) {
            anunciarRespuestaCorrecta();
            botonAceptarRespuestaUsuario.style.display = "none";
        }
        else {
            anunciarRespuestaIncorrecta();
            botonAceptarRespuestaUsuario.style.display = "flex";
        }
    }

    botonAceptarRespuestaUsuario.addEventListener("click", evaluarRespuestaUsuario);
    inputRespuestaUsuario.addEventListener("keypress", (e) => {
        if (e.key === 'Enter') {
            evaluarRespuestaUsuario()
        }
    });
    generarReto();
</script>
<style>
    .boton {
        margin: 1rem auto;
    }

    .inputRespuestaUsuario {
        margin: 0px auto;
        display: block;
        text-align: center;
    }

    #bloqueRespuestaUsuario {
        margin-top: 2rem;
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
    }

    #contenedorMultiplicacion {
        margin: 1rem auto;
        position: relative;
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
    }

    #contenedorMultiplicacion representacion-numero-bolitas {
        margin: unset;
    }
</style>
