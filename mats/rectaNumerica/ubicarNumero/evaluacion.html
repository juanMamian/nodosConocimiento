<script>
    const botonAceptarRespuestaUsuario = document.querySelector("#botonAceptarRespuestaUsuario");
    const inputRespuestaUsuario = document.querySelector("#inputRespuestaUsuario");
    const spanNumeroReto = document.querySelector("#spanNumeroReto")
    const rectaNumerica = document.querySelector("recta-numerica");

    function handleKeypress(evento) {
        evento.stopPropagation();
        if (evento.key === 'Enter') {
            evaluarRespuestaUsuario();
        }

    }
    botonAceptarRespuestaUsuario.addEventListener("click", evaluarRespuestaUsuario);

    function generadorReto() {
        respuesta = Math.round(Math.random() * 40) - 20;
        rectaNumerica.limpiarResaltados();
        spanNumeroReto.textContent = respuesta;
    }
    function recolectarRespuestaUsuario() {
        const resaltados = rectaNumerica.leerResaltados();
        if (resaltados.length < 1) {
            return null;
        }
        return Number(resaltados[0]);
    }
    generadorReto();

</script>
