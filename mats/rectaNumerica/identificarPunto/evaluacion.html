<body>
    <div id="contenedorPrincipal">

        <recta-numerica esconder-numeros>
        </recta-numerica>
        <div id="bloqueRespuestaUsuario">
            <div class="instruccion">
                Identifica el punto marcado
            </div>
            <input type="number" id="inputRespuestaUsuario" class="inputRespuestaUsuario">

            <button class="boton" id="botonAceptarRespuestaUsuario">
                Aceptar
            </button>
        </div>

        <declaracion-respuesta id="declaracionRespuesta">
        </declaracion-respuesta>

    </div>

</html>

<script>
    const botonAceptarRespuestaUsuario = document.querySelector("#botonAceptarRespuestaUsuario");
    const inputRespuestaUsuario = document.querySelector("#inputRespuestaUsuario");
    const rectaNumerica = document.querySelector("recta-numerica");

    function handleKeypress(evento) {
        evento.stopPropagation();
        if (evento.key === 'Enter') {
            evaluarRespuestaUsuario();
        }

    }
    inputRespuestaUsuario.addEventListener("keypress", handleKeypress);
    botonAceptarRespuestaUsuario.addEventListener("click", evaluarRespuestaUsuario);

    function generadorReto() {
        respuesta = Math.round(Math.random() * 20) - 10;
        rectaNumerica.limpiarResaltados();
        rectaNumerica.resaltarNumero(respuesta, {centrar: true, movimientoCentrar: "deslizar"});
    }
    function recolectarRespuestaUsuario() {

        return Number(inputRespuestaUsuario.value);
    }
    generadorReto();

</script>
<style>
    recta-numerica {

        gap: 1rem;

    #bloqueRespuestaUsuario {
